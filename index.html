<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>第一印象タイプ診断</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;

/* 可愛い背景 */

background:
radial-gradient(circle at 20% 20%,#ffd9e8 0,#ffd9e800 40%),
radial-gradient(circle at 80% 10%,#dcd8ff 0,#dcd8ff00 40%),
radial-gradient(circle at 10% 80%,#c9f1ff 0,#c9f1ff00 40%),
linear-gradient(180deg,#ffe4ee,#f4ebff,#e8f7ff);

min-height:100vh;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.card{

background:white;
border-radius:28px;
padding:26px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);

}

.title-small{
text-align:center;
font-size:14px;
color:#666;
}

.title-main{
text-align:center;
font-size:30px;
font-weight:bold;
color:#4a64d6;
margin-bottom:10px;
}

.description{

text-align:center;
line-height:1.9;
font-size:15px;
margin-bottom:20px;
color:#444;

}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;

}

.choice{

border:none;
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
cursor:pointer;

}

.choice img{

width:100%;
aspect-ratio:1/1;
object-fit:cover;

}

.label{

padding:10px;
font-weight:bold;
font-size:15px;

}

.result{

display:none;
margin-top:20px;
padding:22px;
background:#f6f7ff;
border-radius:20px;

}

.result.show{
display:block;
}

.result h2{
margin:0;
font-size:20px;
color:#5566dd;
}

.result h3{

margin:8px 0;
font-size:22px;
color:#ff5f9a;

}

.result p{

line-height:1.8;

}

.cta{

margin-top:16px;
font-weight:bold;
color:#ff5f9a;
text-align:center;

}

.reset{

margin-top:20px;
text-align:center;

}

.reset button{

background:#4f7cff;
border:none;
color:white;

/* 大きくした */

font-size:18px;
padding:14px 28px;

border-radius:30px;
font-weight:bold;
cursor:pointer;

box-shadow:0 6px 16px rgba(79,124,255,0.3);

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="title-small">あなたの</div>
<div class="title-main">第一印象タイプ診断</div>

<div class="description">

人から最初にどんな印象を持たれやすいのかを診断します。<br>
次の4つの絵の中から一番気になるものを<br>
直感で選んでください。

</div>

<div class="grid">

<button class="choice" onclick="showResult('sky')">
<img src="sky.png">
<div class="label">① 青空</div>
</button>

<button class="choice" onclick="showResult('coffee')">
<img src="coffee.png">
<div class="label">② コーヒーカップ</div>
</button>

<button class="choice" onclick="showResult('night')">
<img src="night.png">
<div class="label">③ 夜景</div>
</button>

<button class="choice" onclick="showResult('cat')">
<img src="cat.png">
<div class="label">④ 猫</div>
</button>

</div>

<div id="result" class="result"></div>

<div class="reset">
<button onclick="resetResult()">もう一度選ぶ</button>
</div>

</div>
</div>

<script>

const results={

sky:{
title:"① 青空を選んだ人",
type:"爽やかタイプ",
text:"明るくて話しかけやすい印象を持たれやすい人。初対面でも安心感を与えるタイプです。自然体で接することができるため人から好かれやすい傾向があります。"
},

coffee:{
title:"② コーヒーを選んだ人",
type:"落ち着きタイプ",
text:"冷静で大人っぽい印象を持たれやすい人。最初は少しクールに見られることもありますが話してみると優しい人だと思われることが多いです。"
},

night:{
title:"③ 夜景を選んだ人",
type:"ミステリアスタイプ",
text:"少し謎めいた魅力的な印象を持たれやすい人。「どんな人なんだろう」と興味を持たれやすいタイプです。"
},

cat:{
title:"④ 猫を選んだ人",
type:"親しみやすいタイプ",
text:"柔らかい雰囲気で話しかけやすい印象を持たれやすい人。初対面でも距離が縮まりやすく周りから安心されることが多いです。"
}

};

function showResult(key){

const r=document.getElementById("result");
const data=results[key];

r.innerHTML=`

<h2>${data.title}</h2>
<h3>${data.type}</h3>
<p>${data.text}</p>

<div class="cta">
診断結果をもとに、先生に相談してみよう！
</div>

`;

r.classList.add("show");

window.scrollTo({
top:r.offsetTop-50,
behavior:"smooth"
});

}

function resetResult(){

const r=document.getElementById("result");

r.classList.remove("show");
r.innerHTML="";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
</html>
