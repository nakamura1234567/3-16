<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>第一印象タイプ診断</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink: #ff7fb0;
      --pink-deep: #ff5f9a;
      --purple: #8b7dff;
      --blue: #5c8dff;
      --yellow: #ffd65c;
      --text: #31456c;
      --card: rgba(255, 255, 255, 0.82);
      --shadow: 0 14px 32px rgba(140, 102, 177, 0.18);
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 207, 128, 0.9), transparent 18%),
        radial-gradient(circle at 85% 12%, rgba(173, 153, 255, 0.9), transparent 20%),
        radial-gradient(circle at 20% 78%, rgba(255, 171, 209, 0.65), transparent 20%),
        linear-gradient(180deg, #ffd3de 0%, #ffdce8 24%, #f4e6ff 58%, #f7f3ff 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(circle, rgba(255,255,255,.85) 0 2px, transparent 2.5px),
        radial-gradient(circle, rgba(255,255,255,.65) 0 1.5px, transparent 2px),
        radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.5px);
      background-size: 180px 180px, 240px 240px, 120px 120px;
      background-position: 20px 60px, 120px 140px, 80px 20px;
      opacity: .4;
    }

    body::after {
      background:
        radial-gradient(16px 6px at 10% 22%, rgba(255,128,170,.85) 98%, transparent 100%),
        radial-gradient(10px 10px at 88% 20%, rgba(255,214,92,.95) 98%, transparent 100%),
        radial-gradient(12px 12px at 82% 70%, rgba(139,125,255,.55) 98%, transparent 100%),
        radial-gradient(8px 18px at 14% 74%, rgba(111,210,169,.9) 98%, transparent 100%),
        radial-gradient(20px 7px at 92% 40%, rgba(255,154,171,.8) 98%, transparent 100%);
      opacity: .75;
    }

    .floating-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      opacity: .75;
    }

    .shape.cross {
      width: 26px;
      height: 26px;
    }

    .shape.cross::before,
    .shape.cross::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 26px;
      height: 7px;
      border-radius: 999px;
      transform: translate(-50%, -50%) rotate(45deg);
      background: #ff8d97;
    }

    .shape.cross::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .shape.wave {
      width: 46px;
      height: 16px;
      border-top: 7px solid #a996ff;
      border-radius: 999px;
      transform: rotate(-8deg);
    }

    .shape.slash {
      width: 10px;
      height: 34px;
      border-radius: 999px;
      background: #ff9a6a;
      transform: rotate(-20deg);
    }

    .shape.tick {
      width: 28px;
      height: 18px;
      border-left: 7px solid #94db88;
      border-bottom: 7px solid #94db88;
      transform: rotate(-45deg);
      border-bottom-left-radius: 6px;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top) + 14px) 14px 40px;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -14px 14px;
      padding: 12px 18px 16px;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(255, 151, 188, 0.55), rgba(255,255,255,0));
    }

    .hero {
      background: linear-gradient(135deg, #ffc3d7, #ffdaeb 38%, #e4dbff 72%, #d8edff);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 20px 18px 18px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 28%, rgba(255,255,255,.8) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 72%, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle at 86% 12%, rgba(255,255,255,.95) 0 3px, transparent 4px);
      background-size: 160px 160px;
      opacity: .7;
      pointer-events: none;
    }

    .hero-top {
      position: relative;
      text-align: center;
      margin-bottom: 10px;
    }

    .hero-sub {
      display: inline-block;
      background: #fff;
      border: 4px solid #ff7fb0;
      color: #444;
      border-radius: 16px;
      padding: 4px 12px;
      font-weight: 900;
      font-size: 15px;
      box-shadow: 0 6px 0 rgba(255, 127, 176, 0.25);
      margin-bottom: 10px;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: .02em;
      color: #fff;
      text-shadow:
        -4px -4px 0 #7d6dff,
         4px -4px 0 #7d6dff,
        -4px  4px 0 #7d6dff,
         4px  4px 0 #7d6dff,
         0    7px 0 rgba(255, 127, 176, 0.45);
    }

    .hero-title .accent {
      color: #ff6f9b;
      text-shadow:
        -4px -4px 0 #fff,
         4px -4px 0 #fff,
        -4px  4px 0 #fff,
         4px  4px 0 #fff,
         0    7px 0 rgba(125, 109, 255, 0.28);
    }

    .intro-card {
      margin-top: 14px;
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 24px 18px 20px;
    }

    .intro-mini {
      text-align: center;
      font-size: 14px;
      color: #7b73b1;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .intro-title {
      text-align: center;
      color: #3d5db7;
      font-size: clamp(30px, 9vw, 44px);
      font-weight: 900;
      line-height: 1.2;
      margin: 0 0 14px;
      letter-spacing: .02em;
    }

    .intro-text {
      text-align: center;
      font-size: 16px;
      line-height: 2;
      margin: 0;
      color: #425682;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .choice {
      border: none;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 10px 10px 12px;
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .choice:active {
      transform: scale(.98);
    }

    .choice img {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      object-fit: cover;
      border-radius: 18px;
      background: #f5f5f5;
    }

    .choice-label {
      padding: 10px 4px 0;
      font-size: 16px;
      font-weight: 800;
      color: #3f4e73;
    }

    .result {
      display: none;
      margin-top: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(248,245,255,.95));
      border-radius: 26px;
      padding: 22px 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.8);
    }

    .result.show {
      display: block;
      animation: pop .25s ease;
    }

    .result-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ff8fb8, #ff6ea5);
      color: #fff;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 12px;
      box-shadow: 0 8px 16px rgba(255, 111, 155, 0.24);
    }

    .result h2 {
      margin: 0 0 6px;
      color: #5060d8;
      font-size: 23px;
      line-height: 1.45;
    }

    .result h3 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.3;
      color: #ff5f9a;
    }

    .result p {
      margin: 0;
      white-space: pre-line;
      font-size: 16px;
      line-height: 2;
      color: #495a84;
      font-weight: 500;
    }

    .actions {
      margin-top: 14px;
      text-align: center;
    }

    .reset-btn {
      border: none;
      background: linear-gradient(135deg, #7f88ff, #5ea4ff);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      border-radius: 999px;
      padding: 12px 22px;
      box-shadow: 0 10px 20px rgba(94,164,255,.28);
      cursor: pointer;
    }

    .note {
      text-align: center;
      margin: 14px 0 0;
      color: #6d75a1;
      font-size: 13px;
      font-weight: 700;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(10px) scale(.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (min-width: 700px) {
      .app {
        max-width: 740px;
      }

      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="floating-shapes" aria-hidden="true">
    <span class="shape cross" style="left: 7%; top: 12%;"></span>
    <span class="shape wave" style="left: 72%; top: 9%;"></span>
    <span class="shape slash" style="left: 26%; top: 8%;"></span>
    <span class="shape tick" style="left: 16%; top: 20%;"></span>
    <span class="shape cross" style="left: 86%; top: 16%; transform: scale(.8);"></span>
    <span class="shape wave" style="left: 8%; top: 68%; transform: scale(.7) rotate(8deg);"></span>
    <span class="shape slash" style="left: 88%; top: 74%; height: 26px;"></span>
    <span class="shape tick" style="left: 80%; top: 82%; transform: rotate(-45deg) scale(.8);"></span>
  </div>

  <main class="app">
    <header class="header">
      <section class="hero">
        <div class="hero-top">
          <div class="hero-sub">毎週<span style="color:#ff5f9a; font-size:1.2em;">火曜</span>は</div>
          <h1 class="hero-title">CLEARの<span class="accent">○○</span>診断</h1>
        </div>
      </section>
    </header>

    <section class="intro-card">
      <div class="intro-mini">あなたの</div>
      <h2 class="intro-title">第一印象タイプ診断</h2>
      <p class="intro-text">
        人から最初にどんな印象を持たれやすいのかを診断します。<br>
        次の4つの絵の中から、一番気になるものを直感で選んでください。
      </p>

      <div class="grid">
        <button class="choice" onclick="showResult('sky')">
          <img src="sky.png" alt="青空" />
          <div class="choice-label">① 青空</div>
        </button>

        <button class="choice" onclick="showResult('coffee')">
          <img src="coffee.png" alt="コーヒーカップ" />
          <div class="choice-label">② コーヒーカップ</div>
        </button>

        <button class="choice" onclick="showResult('night')">
          <img src="night.png" alt="夜景" />
          <div class="choice-label">③ 夜景</div>
        </button>

        <button class="choice" onclick="showResult('cat')">
          <img src="cat.png" alt="猫" />
          <div class="choice-label">④ 猫</div>
        </button>
      </div>

      <div id="result" class="result" aria-live="polite"></div>

      <div class="actions">
        <button class="reset-btn" onclick="resetResult()">もう一度選ぶ</button>
      </div>

      <p class="note">スマホでは2列×2段で表示されます。</p>
    </section>
  </main>

  <script>
    const results = {
      sky: {
        title: '① 青空を選んだ人',
        type: '爽やかタイプ',
        text: '明るくて話しかけやすい印象を持たれやすい人。\n初対面でも安心感を与えるタイプです。\n自然体で接することができるため、人から好かれやすい傾向があります。'
      },
      coffee: {
        title: '② コーヒーを選んだ人',
        type: '落ち着きタイプ',
        text: '冷静で大人っぽい印象を持たれやすい人。\n最初は少しクールに見られることもありますが、\n話してみると優しい人だと思われることが多いです。'
      },
      night: {
        title: '③ 夜景を選んだ人',
        type: 'ミステリアスタイプ',
        text: '少し謎めいた魅力的な印象を持たれやすい人。\n「どんな人なんだろう」と興味を持たれやすいタイプです。'
      },
      cat: {
        title: '④ 猫を選んだ人',
        type: '親しみやすいタイプ',
        text: '柔らかい雰囲気で話しかけやすい印象を持たれやすい人。\n初対面でも距離が縮まりやすく、\n周りから安心されることが多いです。'
      }
    };

    function showResult(key) {
      const resultBox = document.getElementById('result');
      const data = results[key];

      resultBox.innerHTML = `
        <div class="result-badge">診断結果</div>
        <h2>${data.title}</h2>
        <h3>${data.type}</h3>
        <p>${data.text}</p>
      `;

      resultBox.classList.add('show');
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function resetResult() {
      const resultBox = document.getElementById('result');
      resultBox.classList.remove('show');
      resultBox.innerHTML = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
